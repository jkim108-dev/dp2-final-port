<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Modular Shoe Rack</title>

  <!-- FONT -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#070707;
      color:#f5f5f5;
      font-family:'Inter',sans-serif;
      overflow-x:hidden;
    }

    img{
      display:block;
      width:100%;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    /* =========================
       NAV
    ========================== */

    .nav{
      position:fixed;

      top:0;
      left:0;

      width:100%;

      display:flex;
      justify-content:space-between;
      align-items:center;

      padding:2rem 4vw;

      z-index:100;

      backdrop-filter:blur(10px);

      background:rgba(0,0,0,0.2);
    }

    .logo{
      font-size:0.8rem;
      letter-spacing:0.2em;
      text-transform:uppercase;

      color:rgba(255,255,255,0.7);
    }

    .back-button{
      padding:0.8rem 1.4rem;

      border:1px solid rgba(255,255,255,0.12);
      border-radius:999px;

      font-size:0.75rem;
      letter-spacing:0.15em;
      text-transform:uppercase;

      transition:0.4s ease;
    }

    .back-button:hover{
      background:#f5f5f5;
      color:#070707;
    }

    /* =========================
       HERO
    ========================== */

    .hero{
      width:100%;
      min-height:100vh;

      display:flex;
      flex-direction:column;
      justify-content:center;

      padding:12rem 8vw 6rem 8vw;
    }

    .hero-label{
      font-size:0.8rem;
      letter-spacing:0.2em;
      text-transform:uppercase;

      color:rgba(255,255,255,0.4);

      margin-bottom:2rem;
    }

    .hero-title{
      font-size:clamp(4rem,10vw,9rem);
      line-height:0.9;
      letter-spacing:-0.07em;

      margin-bottom:2rem;
    }

    .hero-description{
      max-width:700px;

      font-size:1.1rem;
      line-height:1.9;

      color:rgba(255,255,255,0.7);

      margin-bottom:5rem;
    }

    .hero-image{
      width:100%;
      height:auto;

      border-radius:32px;
    }

    /* =========================
       SECTION
    ========================== */

    .detail-section{
      padding:0 8vw 10rem 8vw;
    }

    .section-header{
      margin-bottom:4rem;
    }

    .section-subtitle{
      font-size:0.8rem;
      letter-spacing:0.2em;
      text-transform:uppercase;

      color:rgba(255,255,255,0.35);

      margin-bottom:1rem;
    }

    .section-title{
      font-size:clamp(2.5rem,5vw,5rem);
      letter-spacing:-0.05em;
    }

    /* =========================
       DETAIL GALLERY
    ========================== */

    .detail-gallery{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:2rem;
    }

    .detail-gallery img{
      width:100%;
      height:500px;

      object-fit:contain;

      border-radius:28px;

      background:#111;

      padding:1rem;

      transition:0.5s ease;
    }

    .detail-gallery img:hover{
      transform:translateY(-8px);
    }

    /* =========================
       SKETCH SECTION
    ========================== */

    .sketch-section{
      padding:0 8vw 12rem 8vw;
    }

    .sketch-gallery{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:2rem;
    }

    .sketch-gallery img{
      width:100%;

      border-radius:28px;

      background:#111;

      transition:0.5s ease;
    }

    .sketch-gallery img:hover{
      transform:translateY(-8px);
    }

    .sketch-small{
      width:100%;

      aspect-ratio:1 / 1;

      object-fit:contain;

      background:#111;

      padding:1rem;
    }

    /* =========================
       RESPONSIVE
    ========================== */

    @media(max-width:900px){

      .detail-gallery,
      .sketch-gallery{
        grid-template-columns:1fr;
      }

    }

  </style>

</head>

<body>

  <!-- NAV -->

  <nav class="nav">

    <div class="logo">
      JAY KIM
    </div>

    <a href="index.html" class="back-button">
      Back
    </a>

  </nav>

  <!-- HERO -->

  <section class="hero">

    <div class="hero-label">
      Featured Project
    </div>

    <h1 class="hero-title">
      Modular<br>
      Shoe Rack
    </h1>

    <p class="hero-description">
      A scalable and adaptable storage system designed
      to organize footwear while maximizing spatial efficiency
      and modular flexibility.
    </p>

    <img
      class="hero-image"
      src="shoe-rack/shoe1.jpg"
      alt=""
    >

  </section>

  <!-- DETAIL GALLERY -->

  <section class="detail-section">

    <div class="section-header">

      <div class="section-subtitle">
        Product Details
      </div>

      <h2 class="section-title">
        Detail Images
      </h2>

    </div>

    <div class="detail-gallery">

      <img src="shoe-rack/detail1.JPG">
      <img src="shoe-rack/detail2.JPG">

      <img src="shoe-rack/detail3.JPG">
      <img src="shoe-rack/detail4.JPG">

    </div>

  </section>

  <!-- SKETCH -->

  <section class="sketch-section">

    <div class="section-header">

      <div class="section-subtitle">
        Process Archive
      </div>

      <h2 class="section-title">
        Sketch Exploration
      </h2>

    </div>

    <div class="sketch-gallery">

      <img
        src="shoe-rack/sketch1.jpg"
        class="sketch-small"
      >

      <img
        src="shoe-rack/sketch2.jpg"
        class="sketch-small"
      >

      <img
        src="shoe-rack/sketch3.jpg"
        class="sketch-small"
      >

      <img
        src="shoe-rack/sketch4.jpg"
        class="sketch-small"
      >

    </div>

  </section>

</body>

</html>
